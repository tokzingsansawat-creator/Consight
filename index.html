<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Consight - Dev Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <style>
    body { font-family: 'Kanit', sans-serif; background: radial-gradient(circle at top left, #0f172a, #020617); color: #e2e8f0; min-height: 100vh; }
    .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.5rem; }
    .mic-btn { width: 150px; height: 150px; border-radius: 50%; background: linear-gradient(135deg, #6366F1, #d946ef); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
    .mic-btn.recording { background: linear-gradient(135deg, #ef4444, #f97316); box-shadow: 0 0 30px rgba(239, 68, 68, 0.5); transform: scale(1.05); }
    .hidden { display: none; }
  </style>
</head>
<body class="flex items-center justify-center p-4">

  <div id="loginPage" class="w-full max-w-md glass-card p-8 text-center">
    <h2 class="text-2xl font-bold mb-6">Consight Login</h2>
    <input type="text" id="teacherName" class="w-full p-3 rounded-xl bg-black/30 border border-violet-500/30 mb-4" placeholder="ชื่อครูแนะแนว">
    <button onclick="login()" class="w-full py-3 bg-violet-600 rounded-xl font-bold">เข้าสู่ระบบ</button>
  </div>

  <div id="mainPage" class="hidden w-full max-w-6xl grid grid-cols-1 lg:grid-cols-2 gap-6">
    
    <div class="glass-card p-8 flex flex-col items-center">
      <h2 class="text-xl font-bold mb-6">ระบบบันทึกการสนทนา</h2>
      <div id="micBtn" class="mic-btn mb-6">
        <i class="fa-solid fa-microphone text-4xl text-white"></i>
      </div>
      <p id="statusText" class="text-slate-400 mb-4">กดปุ่มเพื่อเริ่มบันทึก</p>
      <textarea id="transcription" class="w-full h-32 bg-black/20 p-4 rounded-xl border border-white/10 mb-4" placeholder="ข้อความจะปรากฏที่นี่..."></textarea>
      <button id="analyzeBtn" onclick="generateDashboard()" disabled class="w-full py-3 bg-slate-700 rounded-xl font-bold opacity-50">วิเคราะห์ข้อมูล (Analyze)</button>
    </div>

    <div class="glass-card p-8">
      <h2 class="text-xl font-bold mb-4">Student Insight Dashboard</h2>
      <div id="dashboardPlaceholder" class="h-full flex flex-col justify-center items-center text-slate-500 italic">
        <p>รอผลการประมวลผลเพื่อแสดงแดชบอร์ด...</p>
      </div>
      <div id="dashboardActual" class="hidden space-y-6">
        <div class="h-48 flex justify-center">
            <canvas id="emotionChart"></canvas> </div>
        <div class="bg-white/5 p-4 rounded-xl border-l-4 border-violet-500">
            <h4 class="text-violet-400 font-bold mb-1">สรุปประเด็นสำคัญ:</h4>
            <p id="summaryResult" class="text-sm text-slate-300"></p>
        </div>
      </div>
    </div>

  </div>

  <script>
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    function login() {
        const name = document.getElementById('teacherName').value;
        if(name) {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainPage').classList.remove('hidden');
        }
    }

    // ฟังก์ชันอัดเสียงที่ทำงานได้จริง
    const micBtn = document.getElementById('micBtn');
    micBtn.onclick = async () => {
        if (!isRecording) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.start();
                isRecording = true;
                micBtn.classList.add('recording');
                document.getElementById('statusText').innerText = "กำลังบันทึกเสียง...";
                
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
            } catch (err) {
                alert("กรุณาอนุญาตการเข้าถึงไมโครโฟน");
            }
        } else {
            mediaRecorder.stop();
            isRecording = false;
            micBtn.classList.remove('recording');
            document.getElementById('statusText').innerText = "บันทึกเรียบร้อย!";
            document.getElementById('analyzeBtn').disabled = false;
            document.getElementById('analyzeBtn').classList.remove('bg-slate-700', 'opacity-50');
            document.getElementById('analyzeBtn').classList.add('bg-emerald-600');
            // จำลองข้อความ (ในโปรเจกต์จริงจะส่งไป Whisper API)
            document.getElementById('transcription').value = "วันนี้ผมรู้สึกกังวลเรื่องการสอบเข้ามากครับ นอนไม่ค่อยหลับมาหลายวันแล้ว";
        }
    };

    // ฟังก์ชันสร้าง Dashboard
    function generateDashboard() {
        document.getElementById('dashboardPlaceholder').classList.add('hidden');
        document.getElementById('dashboardActual').classList.remove('hidden');
        document.getElementById('summaryResult').innerText = "นักเรียนมีความวิตกกังวลสูงเรื่องการศึกษาต่อ (85%) ควรให้คำปรึกษาด้านการจัดการความเครียด";

        // สร้างกราฟอารมณ์
        const ctx = document.getElementById('emotionChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['กังวล', 'เครียด', 'ปกติ'],
                datasets: [{
                    data: [60, 30, 10],
                    backgroundColor: ['#8b5cf6', '#ef4444', '#10b981'],
                    borderWidth: 0
                }]
            },
            options: { plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
        });
    }
  </script>
</body>
</html>
